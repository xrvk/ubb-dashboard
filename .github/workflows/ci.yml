name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref. Solo
# devs push quickly; without this the queue fills up with stale runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single job: install once, then fan out lint/typecheck/test in
  # parallel via npm-run-all. For this repo `npm ci` dominates wall
  # time (~30-60s) and the work itself is tiny (~5-15s), so merging
  # 4 jobs into 1 saves 3 cold installs per PR. Re-split if any of
  # lint/typecheck/test/build ever grows to multi-minute runtimes.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Lint, typecheck, and test (parallel, labeled output)
        run: npm run verify
      - name: Build (vite only — typecheck already ran in verify)
        run: npm run build:ci
