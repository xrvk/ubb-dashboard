name: forbidden-strings

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# GitHub's built-in secret scanning + push protection (enabled on this repo)
# only covers known provider token patterns. This job is a custom belt-and-
# suspenders gate for things that aren't credentials but that we still don't
# want in source: real tenant slugs / hostnames the author used during dev.
#
# To add a forbidden pattern, append a Perl-compatible regex to PATTERNS.
# Add an exception path to EXCLUDE_PATHS if a legitimate match exists.
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan tracked files for forbidden strings
        run: |
          set -euo pipefail
          PATTERNS=(
            'tbb-staffship'
            'octodemo'
            '[a-z0-9-]+\.ghe\.com/enterprises/'
          )
          EXCLUDE_PATHS=(
            ':!.github/workflows/forbidden-strings.yml'
            ':!package-lock.json'
          )
          fail=0
          for pat in "${PATTERNS[@]}"; do
            echo "::group::Pattern: $pat"
            if git grep -nIE -- "$pat" "${EXCLUDE_PATHS[@]}"; then
              echo "::error::Forbidden string matched pattern: $pat"
              fail=1
            else
              echo "clean"
            fi
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo
            echo "Forbidden strings detected. These are tenant-specific names or"
            echo "dev URLs that shouldn't be committed. Replace with generic"
            echo "placeholders (e.g. 'acme', 'your-host.example.com') or add an"
            echo "exception to EXCLUDE_PATHS if the match is legitimate."
            exit 1
          fi
