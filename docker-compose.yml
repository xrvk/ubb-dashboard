services:
  # Production: build the static bundle and serve it via nginx on :5003
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ubb-dashboard:latest
    container_name: ubb-dashboard
    ports:
      - "5003:80"
    restart: unless-stopped

  # Dev: Vite dev server with HMR. Run with: docker compose --profile dev up
  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ubb-dashboard:dev
    container_name: ubb-dashboard-dev
    ports:
      - "5003:5003"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - path: .env.local
        required: false
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
